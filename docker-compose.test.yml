# E2E test overlay — use with: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      billionmail-network:
        aliases:
          - mailpit

  mockserver:
    image: wiremock/wiremock:3.10.0
    ports:
      - "9090:8080"
    volumes:
      - ./e2e/mocks/wiremock:/home/wiremock
    command: ["--verbose"]
    networks:
      billionmail-network:
        aliases:
          - mockserver

  postfix-billionmail:
    volumes:
      - postfix-spool:/var/spool/postfix
      - ./conf/postfix/main.test.cf:/etc/postfix/main.cf:ro

volumes:
  postfix-spool:
