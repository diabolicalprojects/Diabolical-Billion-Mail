version: '3.8'

services:
  redis-billionmail:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDISPASS}
    volumes:
      - redis_data:/data
    networks:
      billionmail-network:
        aliases:
          - redis
    restart: always

  postfix-billionmail:
    image: billionmail/postfix:1.6
    hostname: ${BILLIONMAIL_HOSTNAME:-localhost}
    environment:
      - DBHOST=10.0.1.189
      - DBNAME=${DBNAME}
      - DBUSER=${DBUSER}
      - DBPASS=${DBPASS}
      - REDISPASS=${REDISPASS}
    volumes:
      - postfix_data:/var/spool/postfix
    networks:
      billionmail-network:
        aliases:
          - postfix
      dokploy-network:
    restart: always

  dovecot-billionmail:
    image: billionmail/dovecot:1.6
    hostname: ${BILLIONMAIL_HOSTNAME:-localhost}
    environment:
      - DBHOST=10.0.1.189
      - DBNAME=${DBNAME}
      - DBUSER=${DBUSER}
      - DBPASS=${DBPASS}
    volumes:
      - dovecot_data:/var/mail
    networks:
      billionmail-network:
        aliases:
          - dovecot
      dokploy-network:
    restart: always

  webmail-billionmail:
    image: roundcube/roundcubemail:1.6.11-fpm-alpine
    environment:
      - ROUNDCUBEMAIL_DB_TYPE=pgsql
      - ROUNDCUBEMAIL_DB_HOST=10.0.1.189
      - ROUNDCUBEMAIL_DB_PORT=5432
      - ROUNDCUBEMAIL_DB_USER=${DBUSER}
      - ROUNDCUBEMAIL_DB_PASSWORD=${DBPASS}
      - ROUNDCUBEMAIL_DB_NAME=${DBNAME}
    volumes:
      - webmail_data:/var/www/html
    networks:
      billionmail-network:
        aliases:
          - webmail
      dokploy-network:
    restart: always

  core-billionmail:
    image: billionmail/core:4.9.3
    entrypoint: ["sh", "-c", "mkdir -p /opt/billionmail && echo \"ADMIN_USERNAME=${ADMIN_USERNAME}\nADMIN_PASSWORD=${ADMIN_PASSWORD}\nSafePath=${SafePath}\nBILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME}\nDBNAME=${DBNAME}\nDBUSER=${DBUSER}\nDBPASS=${DBPASS}\nDBHOST=10.0.1.189\nREDISPASS=${REDISPASS}\nREDISHOST=redis-billionmail\" > /opt/billionmail/.env && supervisord -n -c /etc/supervisord.conf"]
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SafePath=${SafePath:-billion}
      - BILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME:-localhost}
      - REDISPASS=${REDISPASS}
      - REDISHOST=redis-billionmail
      - DBNAME=${DBNAME}
      - DBUSER=${DBUSER}
      - DBPASS=${DBPASS}
      - DBHOST=10.0.1.189
      - FAIL2BAN_INIT=n
    depends_on:
      - redis-billionmail
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
      - NET_RAW
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - core_data:/opt/core/data
    restart: always
    networks:
      billionmail-network:
        aliases:
          - core
      dokploy-network:

networks:
  billionmail-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-billionmail
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_NETWORK:-172.66.1}.0/24
  dokploy-network:
    external: true

volumes:
  redis_data:
  postfix_data:
  dovecot_data:
  webmail_data:
  core_data:
